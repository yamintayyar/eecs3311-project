spring.application.name=servicebooking

# Falls back to H2 locally, overridden by Docker environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/servicebookingdb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true

spring.config.import=optional:file:.env[.properties]
gemini.api.key=${GEMINI_API_KEY}

#debug=true