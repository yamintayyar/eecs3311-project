<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Booking App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Service Booking</h1>

    <!-- Role Selection -->
    <div class="section">
        <label>Select Role:</label>
        <select id="role">
            <option value="client">Client</option>
            <option value="consultant">Consultant</option>
            <option value="admin">Admin</option>
        </select>
    </div>

    <!-- NEW WRAPPER -->
    <div class="auth-wrapper">

        <!-- Register -->
        <div class="auth-box left">
            <h2>Register</h2>
            <input type="text" id="regName" placeholder="Name">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Password">
            <button onclick="register()">Register</button>
        </div>

        <!-- Login -->
        <form onsubmit="login(event)" class="auth-box right">
            <h2>Login</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button type="submit">Login</button>
        </form>

    </div>

    <p id="response"></p>
</div>



    <!-- Chatbot -->
    <div class="show-chatbot" id="chatbot-container">
        <div class="chat-box">
            <div class="chat-box-header">
                <h3>ChatBot</h3>
            </div>

            <div class="chat-box-body">   
                
                <div class="message sent">
                    
                </div>

                <div class="message received">    
                    <p>How can I assist you today?</p>
                </div>
            </div>  

            <div class="chat-box-footer">
                <textarea id="userInput" placeholder="Type here"></textarea>
                <button id="sendBtn">&#10148;</button>
            </div> 
        </div>
        <div class="chatbot-button" id="chatBtn">
            <button id="chat-btn">&#x1F4AC;</button>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
