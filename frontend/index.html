<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Booking — Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

<div class="container">
  <h1>🗓️ Service Booking</h1>

  <div class="section">
    <label>I am a…</label>
    <select id="role">
      <option value="client">Client</option>
      <option value="consultant">Consultant</option>
      <option value="admin">Admin</option>
    </select>
  </div>

  <div class="auth-wrapper">
    <!-- Register -->
    <div class="auth-box left">
      <h2>Create Account</h2>
      <input type="text"     id="regName"     placeholder="Full Name">
      <input type="email"    id="regEmail"    placeholder="Email Address">
      <input type="password" id="regPassword" placeholder="Password">
      <button onclick="register()">Register</button>
    </div>

    <!-- Login -->
    <form onsubmit="login(event)" class="auth-box right">
      <h2>Sign In</h2>
      <input type="email"    id="loginEmail"    placeholder="Email Address">
      <input type="password" id="loginPassword" placeholder="Password">
      <button type="submit">Login →</button>
    </form>
  </div>

  <p id="response"></p>
</div>



    <!-- Chatbot -->
    <div class="show-chatbot" id="chatbot-container">
        <div class="chat-box">
            <div class="chat-box-header">
                <h3>ChatBot</h3>
            </div>

            <div class="chat-box-body">   
                
                <div class="message sent">
                    
                </div>

                <div class="message received">    
                    <p>How can I assist you today?</p>
                </div>
            </div>  

            <div class="chat-box-footer">
                <textarea id="userInput" placeholder="Type here"></textarea>
                <button id="sendBtn">&#10148;</button>
            </div> 
        </div>
        <div class="chatbot-button" id="chatBtn">
            <button id="chat-btn">&#x1F4AC;</button>
        </div>
    </div>

<script src="chatbot.js"></script>
<script src="script.js"></script>
</body>
</html>
